name: Pulumi Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  pulumi-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync infra dependencies
        working-directory: infra
        run: uv sync --dev

      - name: Run Pulumi tests
        run: make pulumi-test
